name: ezze_music
description: "A feature-rich local music player with a premium dark luxury design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  marquee: ^2.2.3
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Audio
  just_audio: ^0.10.4
  just_audio_background: ^0.0.1-beta.16

  # Music library query
  on_audio_query:
    git:
      url: https://github.com/rozpo/on_audio_query
      ref: 0d78299
      path: packages/on_audio_query

  # Permissions
  permission_handler: ^12.0.1

  # State management
  provider: ^6.1.5

  # Persistence
  shared_preferences: ^2.5.3

  # Utilities
  collection: ^1.19.1

  # File picking (iOS import)
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.13.1

# ── Launcher icon config ─────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D0D14"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: false

# ── Flutter config ───────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/icon/